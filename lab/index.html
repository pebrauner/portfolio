<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab — Pedro Brauner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111;
      --border: rgba(255,255,255,0.06);
      --text: #f0ede8;
      --text-muted: rgba(240,237,232,0.45);
      --accent: #e03418;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;
      height: 60px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,8,0.9);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .nav-logo {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
    }

    .nav-logo span { color: var(--accent); }

    .nav-back {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--text); }

    main {
      padding: 140px 60px 100px;
      max-width: 1000px;
    }

    .label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 10vw, 120px);
      line-height: 0.9;
      letter-spacing: -1px;
      margin-bottom: 24px;
    }

    .description {
      color: var(--text-muted);
      font-size: 16px;
      font-weight: 300;
      line-height: 1.7;
      max-width: 480px;
      margin-bottom: 80px;
    }

    .projects-label {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 2px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .project-list {
      list-style: none;
    }

    .project-list li {
      border-bottom: 1px solid var(--border);
    }

    .project-list a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0;
      text-decoration: none;
      color: var(--text);
      transition: color 0.2s;
      gap: 24px;
    }

    .project-list a:hover { color: var(--accent); }

    .project-list a:hover .arrow { transform: translateX(4px); color: var(--accent); }

    .project-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 1px;
      line-height: 1;
    }

    .project-meta {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .arrow {
      font-size: 20px;
      color: var(--text-muted);
      transition: transform 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    @media (max-width: 768px) {
      nav { padding: 0 24px; }
      main { padding: 120px 24px 80px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">PB<span>.</span></a>
  <a href="/" class="nav-back">← Back to Portfolio</a>
</nav>

<main>
  <div class="label">Pedro Brauner</div>
  <h1>THE<br>LAB</h1>
  <p class="description">
    Work in progress. Prototypes, experiments, and concepts tested before they ship.
  </p>

  <div class="projects-label">Projects</div>
  <ul class="project-list">
    <li>
      <a href="/lab/rdy/p1/">
        <div>
          <div class="project-name">CS Prot</div>
          <div class="project-meta">Hub & Role Analysis · In progress</div>
        </div>
        <span class="arrow">→</span>
      </a>
    </li>
    <li>
      <a href="/lab/dota-prot/">
        <div>
          <div class="project-name">Dota 2 Prototype</div>
          <div class="project-meta">TI 2026 · Hub & Match Analysis · In progress</div>
        </div>
        <span class="arrow">→</span>
      </a>
    </li>
  </ul>
</main>

</body>
</html>
